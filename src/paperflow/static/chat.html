<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Paper Flow Chat</title>
  <style>
    :root { color-scheme:light; --bg:#f7f7f8; --surface:#fff; --surface-2:#f0f1f3; --text:#18181b; --muted:#686a72; --border:#dedfe3; --accent:#4f46e5; --accent-hover:#4338ca; --accent-text:#fff; --danger:#b42318 }
    @media(prefers-color-scheme:dark){:root{color-scheme:dark;--bg:#0f1012;--surface:#18191d;--surface-2:#23252a;--text:#f4f4f5;--muted:#b4b6bd;--border:#363840;--accent:#818cf8;--accent-hover:#a5b4fc;--accent-text:#101114;--danger:#fda29b}}
    * { box-sizing:border-box } html,body { height:100%; margin:0 } body { overflow:hidden; background:var(--bg); color:var(--text); font:14px/1.6 Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif }
    button,a,textarea { font:inherit } button { cursor:pointer } .shell { display:grid; grid-template-columns:290px minmax(0,1fr); height:100vh }
    aside { display:flex; min-width:0; flex-direction:column; border-right:1px solid var(--border); background:var(--surface) } .brand { padding:24px 22px 18px; border-bottom:1px solid var(--border) } .brand strong { display:block; font-size:18px; letter-spacing:-.02em } .brand span { color:var(--muted); font-size:12px }
    .history-heading { padding:18px 18px 8px; color:var(--muted); font-size:11px; font-weight:700; letter-spacing:.08em; text-transform:uppercase } .thread-list { display:flex; min-height:0; flex:1; flex-direction:column; gap:5px; overflow-y:auto; padding:4px 10px 18px }
    .thread { width:100%; border:1px solid transparent; border-radius:11px; padding:11px 12px; background:transparent; color:var(--text); text-align:left } .thread:hover { background:var(--surface-2) } .thread.active { border-color:var(--border); background:var(--surface-2) } .thread-title,.thread-preview { overflow:hidden; text-overflow:ellipsis; white-space:nowrap } .thread-title { font-weight:650 } .thread-preview { margin-top:2px; color:var(--muted); font-size:11px }
    .empty-history { padding:22px 12px; color:var(--muted); font-size:12px; text-align:center } main { display:grid; min-width:0; grid-template-rows:auto minmax(0,1fr) auto; background:var(--bg) }
    .paper-head { display:flex; align-items:center; justify-content:space-between; gap:20px; padding:20px 26px; border-bottom:1px solid var(--border); background:color-mix(in srgb,var(--surface) 88%,transparent) } .paper-title { min-width:0 } .paper-title h1 { overflow:hidden; margin:0; font-size:17px; letter-spacing:-.01em; text-overflow:ellipsis; white-space:nowrap } .paper-title p { margin:2px 0 0; color:var(--muted); font-size:11px } .paper-links { display:flex; flex-shrink:0; gap:8px } .paper-links a { border:1px solid var(--border); border-radius:9px; padding:7px 11px; color:var(--text); text-decoration:none } .paper-links a:hover { background:var(--surface-2) }
    .messages { display:flex; min-height:0; flex-direction:column; gap:18px; overflow-y:auto; padding:30px max(28px,calc((100% - 820px)/2)) 36px } .empty-chat { margin:auto; max-width:520px; color:var(--muted); text-align:center } .empty-chat strong { display:block; margin-bottom:8px; color:var(--text); font-size:18px }
    .message { max-width:88%; border-radius:16px; padding:14px 18px; line-height:1.72 } .message.user { align-self:flex-end; background:var(--accent); color:var(--accent-text) } .message.assistant { align-self:flex-start; border:1px solid var(--border); background:var(--surface) } .message p { margin:8px 0 } .message h1,.message h2,.message h3,.message h4 { margin:18px 0 7px; font-size:16px; line-height:1.35 } .message ul,.message ol { margin:8px 0; padding-left:24px } .message code { border-radius:5px; padding:2px 5px; background:var(--surface-2) }
    .evidence-list { display:flex; flex-wrap:wrap; gap:6px; margin-top:12px; padding-top:10px; border-top:1px solid var(--border) } .evidence-chip { border-radius:999px; padding:3px 8px; background:var(--surface-2); color:var(--muted); font-size:10px }
    .composer-wrap { padding:16px max(24px,calc((100% - 860px)/2)) 20px; border-top:1px solid var(--border); background:var(--surface) } .composer { border:1px solid var(--border); border-radius:16px; padding:11px 12px 10px; background:var(--bg) } textarea { width:100%; min-height:64px; max-height:180px; resize:vertical; border:0; outline:0; padding:3px 5px; background:transparent; color:var(--text) } .composer-foot { display:flex; align-items:center; justify-content:space-between; gap:12px; margin-top:6px } .status { min-height:20px; color:var(--muted); font-size:11px } .send { min-width:76px; border:1px solid var(--accent); border-radius:9px; padding:8px 14px; background:var(--accent); color:var(--accent-text); font-weight:650 } .send:hover { background:var(--accent-hover) } .send:disabled { opacity:.55; cursor:wait } .error { color:var(--danger) }
    @media(max-width:820px){.shell{grid-template-columns:230px minmax(0,1fr)}.paper-head{padding:16px 18px}.messages{padding-left:22px;padding-right:22px}.paper-links a:first-child{display:none}}
  </style>
</head>
<body>
<div class="shell">
  <aside>
    <div class="brand"><strong>Paper Flow</strong><span id="brand-subtitle">论文对话</span></div>
    <div id="history-heading" class="history-heading">对话历史</div>
    <div id="thread-list" class="thread-list"></div>
  </aside>
  <main>
    <header class="paper-head">
      <div class="paper-title"><h1 id="paper-title">Paper Flow Chat</h1><p id="paper-subtitle">选择左侧记录或从论文卡片打开对话</p></div>
      <div class="paper-links"><a id="abstract-link" href="#" target="_blank" rel="noopener" hidden>arXiv</a><a id="pdf-link" href="#" target="_blank" rel="noopener" hidden>打开原 PDF</a></div>
    </header>
    <section id="messages" class="messages"></section>
    <div class="composer-wrap"><div class="composer"><textarea id="chat-input" placeholder="询问方法、实验、公式、局限或任何你关心的细节" disabled></textarea><div class="composer-foot"><span id="status" class="status"></span><button id="send" class="send" disabled>发送</button></div></div></div>
  </main>
</div>
<script>
  const copy={
    中文:{brand:'论文对话',history:'对话历史',emptyHistory:'还没有论文对话记录',selectPaper:'选择左侧记录或从论文卡片打开对话',emptyTitle:'从一个具体问题开始',emptyChat:'默认问题会详细解释论文方法；也可以直接询问实验、公式、假设、对比或局限。',placeholder:'询问方法、实验、公式、局限或任何你关心的细节',defaultPrompt:'为我详细介绍这篇论文的方法',send:'发送',openPdf:'打开原 PDF',preparing:'正在准备论文全文…',downloading:'正在下载原始 PDF…',extracting:'正在提取论文全文…',context:'论文上下文已准备完成…',answering:'LLM 正在根据论文回答…'},
    English:{brand:'Paper chat',history:'Chat history',emptyHistory:'No paper chats yet',selectPaper:'Choose a conversation or open one from a paper card',emptyTitle:'Start with a specific question',emptyChat:'The default question explains the paper method in detail, or ask directly about experiments, equations, assumptions, comparisons, or limitations.',placeholder:'Ask about methods, experiments, equations, limitations, or any detail',defaultPrompt:"Give me a detailed explanation of this paper's method.",send:'Send',openPdf:'Open original PDF',preparing:'Preparing the full paper…',downloading:'Downloading the original PDF…',extracting:'Extracting the full paper text…',context:'Full paper context is ready…',answering:'LLM is answering from the paper…'}
  };
  let language='中文',currentPaper=null,threads=[],pollTimer=null;
  const tr=key=>copy[language]?.[key]||copy.中文[key]||key,esc=value=>String(value??'').replace(/[&<>"']/g,char=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[char]));
  function markdown(source){const inline=value=>esc(value).replace(/`([^`]+)`/g,'<code>$1</code>').replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>').replace(/__([^_]+)__/g,'<strong>$1</strong>').replace(/\*([^*]+)\*/g,'<em>$1</em>'),lines=String(source??'').replace(/\r/g,'').split('\n'),out=[];let list=null,paragraph=[];const flushParagraph=()=>{if(paragraph.length){out.push(`<p>${inline(paragraph.join(' '))}</p>`);paragraph=[]}},flushList=()=>{if(list){out.push(`</${list}>`);list=null}};for(const raw of lines){const line=raw.trim();if(!line){flushParagraph();flushList();continue}const heading=line.match(/^(#{1,6})\s+(.+)$/),bullet=line.match(/^[-*+]\s+(.+)$/),number=line.match(/^\d+[.)]\s+(.+)$/);if(heading){flushParagraph();flushList();const level=Math.min(4,heading[1].length);out.push(`<h${level}>${inline(heading[2])}</h${level}>`)}else if(bullet||number){flushParagraph();const type=bullet?'ul':'ol';if(list!==type){flushList();list=type;out.push(`<${type}>`)}out.push(`<li>${inline((bullet||number)[1])}</li>`)}else{flushList();paragraph.push(line)}}flushParagraph();flushList();return out.join('')}
  async function api(url,options){const response=await fetch(url,options),value=await response.json();if(!response.ok)throw Error(value.error||response.statusText);return value}
  function applyLanguage(){document.documentElement.lang=language==='English'?'en':'zh-CN';document.querySelector('#brand-subtitle').textContent=tr('brand');document.querySelector('#history-heading').textContent=tr('history');document.querySelector('#chat-input').placeholder=tr('placeholder');document.querySelector('#send').textContent=tr('send');document.querySelector('#pdf-link').textContent=tr('openPdf');if(!currentPaper)document.querySelector('#paper-subtitle').textContent=tr('selectPaper');renderThreads();renderMessages()}
  function renderThreads(){const list=document.querySelector('#thread-list'),items=[...threads];if(currentPaper&&!items.some(item=>item.paper_id===currentPaper.paper_id))items.unshift({paper_id:currentPaper.paper_id,title:currentPaper.title,preview:''});list.innerHTML=items.length?items.map(item=>`<button class="thread ${currentPaper?.paper_id===item.paper_id?'active':''}" data-paper-id="${esc(item.paper_id)}" onclick="openThread(this.dataset.paperId)"><div class="thread-title">${esc(item.title)}</div><div class="thread-preview">${esc(item.preview||'')}</div></button>`).join(''):`<div class="empty-history">${tr('emptyHistory')}</div>`}
  function renderMessages(){const box=document.querySelector('#messages'),messages=currentPaper?.messages||[];box.innerHTML=messages.length?messages.map(item=>{const evidence=item.metadata?.evidence||[],sources=evidence.length?`<div class="evidence-list">${evidence.map(source=>`<span class="evidence-chip" title="${esc(source.heading)}">[${esc(source.evidence_id)}] ${esc(source.heading)}</span>`).join('')}</div>`:'';return`<div class="message ${item.role}">${item.role==='assistant'?markdown(item.content)+sources:esc(item.content)}</div>`}).join(''):`<div class="empty-chat"><strong>${tr('emptyTitle')}</strong>${tr('emptyChat')}</div>`;box.scrollTop=box.scrollHeight}
  async function refreshThreads(){threads=await api('/api/chats');renderThreads()}
  async function openThread(paperId){try{currentPaper=await api(`/api/papers/${encodeURIComponent(paperId)}/chat`);history.replaceState(null,'',`?paper_id=${encodeURIComponent(paperId)}`);document.title=`${currentPaper.title} · Paper Flow`;document.querySelector('#paper-title').textContent=currentPaper.title;document.querySelector('#paper-subtitle').textContent=tr('brand');const abstractLink=document.querySelector('#abstract-link'),pdfLink=document.querySelector('#pdf-link');abstractLink.href=currentPaper.url;abstractLink.hidden=false;pdfLink.href=currentPaper.pdf_url;pdfLink.hidden=false;const input=document.querySelector('#chat-input'),send=document.querySelector('#send');input.disabled=false;send.disabled=false;if(!currentPaper.messages.length)input.value=tr('defaultPrompt');else input.value='';renderThreads();renderMessages();input.focus()}catch(error){document.querySelector('#status').textContent=error.message;document.querySelector('#status').classList.add('error')}}
  function progressMessage(state){const english=language==='English';return{chat_preparing:tr('preparing'),chat_downloading:tr('downloading'),chat_mineru_health:english?'Connecting to MinerU parser…':'正在连接 MinerU 解析服务…',chat_mineru_parsing:english?'MinerU is reconstructing the paper structure…':'MinerU 正在重建论文版面与结构…',chat_extracting:tr('extracting'),chat_structuring:english?'Selecting coherent evidence sections…':'正在选择连续且相关的证据章节…',chat_context_ready:tr('context'),llm_answering:tr('answering')}[state.stage]||tr('preparing')}
  async function pollProgress(){const send=document.querySelector('#send');if(!send.disabled)return;try{document.querySelector('#status').textContent=progressMessage(await api('/api/progress'))}catch{}finally{if(send.disabled)pollTimer=setTimeout(pollProgress,350)}}
  async function sendMessage(){const input=document.querySelector('#chat-input'),send=document.querySelector('#send'),status=document.querySelector('#status'),message=input.value.trim();if(!currentPaper||!message||send.disabled)return;currentPaper.messages.push({role:'user',content:message});input.value='';renderMessages();send.disabled=true;status.classList.remove('error');status.textContent=tr('preparing');clearTimeout(pollTimer);pollProgress();let failed=false;try{const result=await api(`/api/papers/${encodeURIComponent(currentPaper.paper_id)}/chat`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message})});currentPaper.messages=result.messages;renderMessages();await refreshThreads()}catch(error){failed=true;status.classList.add('error');status.textContent=error.message}finally{send.disabled=false;clearTimeout(pollTimer);pollTimer=null;if(!failed)status.textContent='';input.focus()}}
  async function init(){try{const settings=await api('/api/settings');language=settings.language==='English'?'English':'中文';applyLanguage();await refreshThreads();const paperId=new URLSearchParams(location.search).get('paper_id')||threads[0]?.paper_id;if(paperId)await openThread(paperId)}catch(error){document.querySelector('#status').textContent=error.message;document.querySelector('#status').classList.add('error')}}
  document.querySelector('#send').onclick=sendMessage;document.querySelector('#chat-input').onkeydown=event=>{if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}};init();
</script>
</body>
</html>
